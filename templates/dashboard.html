<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background: #f1f4f9; }
        .card { border-radius: 15px; }
        .sidebar {
            height: 100vh;
            background: #111827;
            color: white;
            position: fixed;
            width: 230px;
        }
        .sidebar a {
            color: #d1d5db;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }
        .sidebar a:hover {
            background: #1f2937;
            color: white;
        }
        .content {
            margin-left: 230px;
            padding: 30px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="p-3">Admin</h4>
    <a href="/dashboard">Dashboard</a>
    <a href="/add_product">Add Product</a>
    <a href="/site_settings">Site Settings</a>

    <a href="/admin/pages">Pages</a>
    <a href="/admin/page_builder">Page Builder</a>
    <a href="/orders">Orders</a>
    <a href="/">View Store</a>
    <a href="/logout">Logout</a>
</div>

<div class="content">

    <h3 class="mb-4">Sales Dashboard</h3>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card shadow p-3">
                <h6>Total Orders</h6>
                <h3>{{ total_orders }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h6>Completed Orders</h6>
                <h3>{{ completed_orders }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h6>Total Revenue</h6>
                <h3 class="text-success">${{ total_revenue }}</h3>
            </div>
        </div>
    </div>

    <div class="card shadow p-4">
        <h5>Revenue Per Order</h5>
        <canvas id="salesChart"></canvas>
    </div>

</div>

<script>
    const ctx = document.getElementById('salesChart').getContext('2d');

    const salesChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: {{ labels | tojson }},
            datasets: [{
                label: 'Revenue',
                data: {{ values | tojson }},
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
</script>

</body>
</html>
