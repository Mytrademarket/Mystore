<!DOCTYPE html>
<html>
<head>
    <title>Manage Pages</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f1f4f9;
        }

        .sidebar{
            height:100vh;
            background:#111827;
            position:fixed;
            width:230px;
            color:white;
        }

        .sidebar a{
            color:#d1d5db;
            text-decoration:none;
            display:block;
            padding:12px 20px;
        }

        .sidebar a:hover{
            background:#1f2937;
            color:white;
        }

        .content{
            margin-left:230px;
            padding:30px;
        }

    </style>
</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <h4 class="p-3">Admin</h4>

    <a href="/dashboard">Dashboard</a>
    <a href="/add_product">Add Product</a>
    <a href="/orders">Orders</a>
    <a href="/admin/pages">Pages</a>
    <a href="/site_settings">Site Settings</a>
    <a href="/">View Store</a>
<a href="/logout">Logout</a>
</div>

<!-- Content -->

<div class="content">

    <h3 class="mb-4">Mytrademarket Pages</h3>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover">

                <thead class="table-dark">

                    <tr>
                        <th>Page</th>
                        <th>Slug</th>
                        <th>Action</th>
                    </tr>

                </thead>

                <tbody>

                {% for page in pages %}

                <tr>

                    <td>{{ page.title }}</td>

                    <td>
                        <span class="badge bg-secondary">
                        /page/{{ page.slug }}
                        </span>
                    </td>

                    <td>

                        <a href="/admin/edit_page/{{ page.id }}"
                           class="btn btn-primary btn-sm">

                           Edit

                        </a>

                    </td>

                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
