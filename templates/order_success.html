<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Successful</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.success-icon{
font-size:70px;
color:#28a745;
}

.order-box{
max-width:600px;
margin:auto;
border-radius:12px;
}

.order-info{
background:#f8f9fa;
border-radius:10px;
padding:20px;
}

</style>

</head>
<body class="bg-light">

<div class="container py-5">

<div class="card shadow-lg border-0 order-box">

<div class="card-body text-center p-5">

<div class="success-icon mb-3">
✔
</div>

<h2 class="text-success fw-bold">Order Placed Successfully!</h2>

<p class="text-muted">
Thank you for your purchase. Your order has been received and is now being processed.
</p>

<div class="order-info mt-4">

<div class="row mb-2">
<div class="col text-start fw-bold">Order ID</div>
<div class="col text-end">#{{ order.id }}</div>
</div>

<div class="row mb-2">
<div class="col text-start fw-bold">Total Amount</div>
<div class="col text-end">${{ order.total }}</div>
</div>

</div>

<div class="mt-4">

<a href="/" class="btn btn-dark me-2">
Continue Shopping
</a>

<a href="/order/{{ order.id }}" class="btn btn-dark mt-3">
View Order Receipt
</a>

</div>

</div>

</div>

</div>

</body>
</html>
