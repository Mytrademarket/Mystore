<!DOCTYPE html>
<html>
<head>
<title>Import Product</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.sidebar{
height:100vh;
background:#343a40;
padding-top:20px;
}

.sidebar a{
color:white;
display:block;
padding:12px;
text-decoration:none;
}

.sidebar a:hover{
background:#495057;
}
</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->
<div class="col-md-2 sidebar">

<h4 class="text-white text-center">Admin</h4>

<a href="/admin">Dashboard</a>
<a href="/products">Products</a>
<a href="/orders">Orders</a>
<a href="/site_settings">Site Settings</a>
<a href="/admin/import_product">Import Product</a>
<a href="/admin/integrations">Integrations</a>
<a href="/logout">Logout</a>

</div>


<!-- Main Content -->
<div class="col-md-10 p-4 bg-light">

<h2 class="mb-4">Import Product</h2>

<div class="card shadow">

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">AliExpress Product Link</label>

<input
type="text"
name="product_url"
class="form-control"
placeholder="Paste AliExpress product link"
required
>

</div>

<div class="mb-3">

<label class="form-label">Markup Percentage</label>

<input
type="number"
name="markup"
class="form-control"
value="30"
>

</div>

<button class="btn btn-success">
Import Product
</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
