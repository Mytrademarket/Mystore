<!DOCTYPE html>
<html>
<head>
    <title>Site Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f1f4f9; }
        .sidebar {
            height: 100vh;
            background: #111827;
            color: white;
            position: fixed;
            width: 230px;
        }
        .sidebar a {
            color: #d1d5db;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }
        .sidebar a:hover { background: #1f2937; color: white; }
        .content { margin-left: 230px; padding: 30px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="p-3">Admin</h4>
    <a href="/dashboard">Dashboard</a>
    <a href="/add_product">Add Product</a>
    <a href="/orders">Orders</a>
    <a href="/site_settings">Site Settings</a>
    <a href="/">View Store</a>
    <a href="/logout">Logout</a>
</div>

<div class="content">
    <h3>Site Settings</h3>
    
    <hr>


<hr>
<h5>WhatsApp Chat</h5>

<div class="mb-3">
<label>WhatsApp Number</label>
<input type="text" name="whatsapp" class="form-control" value="{{ whatsapp or '' }}">
</div>

<hr>
<h5>Analytics</h5>

<div class="mb-3">
<label>Google Analytics Tracking ID</label>
<input type="text" name="google_analytics" class="form-control" value="{{ google_analytics or '' }}">
</div>
    
    <!-- SINGLE FORM for Logo + Footer -->
    <form method="POST" enctype="multipart/form-data">

        <!-- Logo -->
        <div class="mb-3">
            <label class="form-label">Current Logo</label><br>
            {% if logo %}
                <img src="{{ url_for('static', filename='uploads/' ~ logo) }}" height="80">
            {% else %}
                No logo uploaded
            {% endif %}
        </div>

<h5>Favicon</h5>

<div class="mb-3">
<label>Upload Favicon</label>
<input type="file" class="form-control" name="favicon">
</div>

        <div class="mb-3">
            <label class="form-label">Upload New Logo</label>
            <input type="file" class="form-control" name="logo">
        </div>

        <hr>

        <h5>Footer Settings</h5>

        <!-- Footer About -->
        <div class="mb-3">
            <label>About Us</label>
            <textarea name="footer_about" class="form-control text-red" rows="3">{{ footer_about or "" }}</textarea>
        </div>

        <!-- Contact -->
        <div class="mb-3">
            <label>Phone</label>
            <input type="text" name="footer_contact_phone" class="form-control" value="{{ footer_contact_phone or "" }}">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="text" name="footer_contact_email" class="form-control" value="{{ footer_contact_email or "" }}">
        </div>

        <div class="mb-3">
            <label>Address</label>
            <input type="text" name="footer_address" class="form-control" value="{{ footer_address or "" }}">
        </div>

<hr>

<h5>Social Media Links</h5>

<div class="mb-3">
<label>Facebook</label>
<input type="text" name="facebook" class="form-control" value="{{ facebook or '' }}">
</div>

<div class="mb-3">
<label>Instagram</label>
<input type="text" name="instagram" class="form-control" value="{{ instagram or '' }}">
</div>

<div class="mb-3">
<label>Twitter</label>
<input type="text" name="twitter" class="form-control" value="{{ twitter or '' }}">
</div>

<div class="mb-3">
<label>YouTube</label>
<input type="text" name="youtube" class="form-control" value="{{ youtube or '' }}">
</div>

<div class="mb-3">
<label>TikTok</label>
<input type="text" name="tiktok" class="form-control" value="{{ tiktok or '' }}">
</div>

<hr>

<h5>Footer Pages</h5>

<div class="mb-3">
<label>Privacy Policy Page</label>
<input type="text" name="privacy_policy_page" class="form-control" value="{{ privacy_policy_page or '' }}">
</div>

<div class="mb-3">
<label>Terms & Conditions Page</label>
<input type="text" name="terms_page" class="form-control" value="{{ terms_page or '' }}">
</div>

<div class="mb-3">
<label>Refund Policy Page</label>
<input type="text" name="refund_page" class="form-control" value="{{ refund_page or '' }}">
</div>

<div class="mb-3">
<label>Shipping Policy Page</label>
<input type="text" name="shipping_page" class="form-control" value="{{ shipping_page or '' }}">
</div>

<div class="mb-3">
<label>Contact Page</label>
<input type="text" name="contact_page" class="form-control" value="{{ contact_page or '' }}">
</div>

<div class="mb-3">
<label>FAQ Page</label>
<input type="text" name="faq_page" class="form-control" value="{{ faq_page or '' }}">
</div>

<hr>
<h5>Store Information</h5>

<div class="mb-3">
<label>Store Name</label>
<input type="text" name="store_name" class="form-control" value="{{ store_name or '' }}">
</div>

<div class="mb-3">
<label>Store Email</label>
<input type="text" name="store_email" class="form-control" value="{{ store_email or '' }}">
</div>

<div class="mb-3">
<label>Store Phone</label>
<input type="text" name="store_phone" class="form-control" value="{{ store_phone or '' }}">
</div>

<div class="mb-3">
<label>Store Address</label>
<input type="text" name="store_address" class="form-control" value="{{ store_address or '' }}">
</div>

        <button class="btn btn-success">Save Settings</button>
    </form>
</div>



</body>
</html>
