<!DOCTYPE html>
<html>
<head>
    <title>Edit Page</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- TinyMCE Editor -->
    <script src="https://cdn.tiny.cloud/1/skjl7am65ql04cosxmrvy1qqyu364v7qbsupk6fzwlb4i8xb/tinymce/6/tinymce.min.js"></script>

    <script>
        tinymce.init({
            selector: 'textarea',
            height: 500,
            plugins: [
                'advlist autolink lists link image charmap preview',
                'searchreplace visualblocks code fullscreen',
                'insertdatetime media table code help wordcount'
            ],
            toolbar:
                'undo redo | blocks | bold italic underline | \
                alignleft aligncenter alignright alignjustify | \
                bullist numlist outdent indent | link image | code'
        });
    </script>

    <style>

        body{
            background:#f1f4f9;
        }

        .sidebar{
            height:100vh;
            background:#111827;
            color:white;
            position:fixed;
            width:230px;
        }

        .sidebar a{
            color:#d1d5db;
            text-decoration:none;
            display:block;
            padding:12px 20px;
        }

        .sidebar a:hover{
            background:#1f2937;
            color:white;
        }

        .content{
            margin-left:230px;
            padding:30px;
        }

    </style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <h4 class="p-3">Admin</h4>

    <a href="/dashboard">Dashboard</a>
    <a href="/add_product">Add Product</a>
    <a href="/orders">Orders</a>
    <a href="/admin/pages">Pages</a>
    <a href="/site_settings">Site Settings</a>
    <a href="/">View Store</a>
<a href="/logout">Logout</a>
</div>

<!-- Content -->

<div class="content">

<h3 class="mb-4">Edit Page</h3>

<div class="card shadow">

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">Page Title</label>

<input type="text"
       name="title"
       class="form-control"
       value="{{ page.title }}">

</div>


<div class="mb-3">

<label class="form-label">Page Content</label>

<textarea name="content">{{ page.content }}</textarea>

</div>

<button class="btn btn-success">
Save Page
</button>

<a href="/admin/pages" class="btn btn-secondary">
Back
</a>

</form>

</div>
</div>

</div>

</body>
</html>
