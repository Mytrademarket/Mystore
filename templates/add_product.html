<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f1f4f9;
        }

        .sidebar {
            height: 100vh;
            background: #111827;
            color: white;
            position: fixed;
            width: 230px;
        }

        .sidebar h4 {
            padding: 20px;
            border-bottom: 1px solid #374151;
        }

        .sidebar a {
            color: #d1d5db;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }

        .sidebar a:hover {
            background: #1f2937;
            color: white;
        }

        .content {
            margin-left: 230px;
            padding: 30px;
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4><i class="bi bi-speedometer2"></i> Admin</h4>
    <a href="/dashboard"><i class="bi bi-house"></i> Dashboard</a>
    <a href="/products"><i class="bi bi-box"></i> Products</a>
    <a href="/cj_products" class="btn btn-primary">
Import CJ Products
</a>
    <a href="/add_category"><i class="bi bi-tags"></i> Categories</a>
    <a href="/orders"><i class="bi bi-receipt"></i> Orders</a>
    <a href="/"><i class="bi bi-shop"></i> View Store</a>
</div>

<!-- Content -->
<div class="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="bi bi-plus-circle"></i> Add New Product</h3>
    </div>

    <div class="card shadow p-4">

        <form method="POST" enctype="multipart/form-data">

            <!-- Product Name -->
            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <!-- Category -->
            <div class="mb-3">
                <label class="form-label">Category</label>

                {% if categories %}
                    <select name="category_id" class="form-control" required>
                        {% for category in categories %}
                            <option value="{{ category.id }}">
                                {{ category.name }}
                            </option>
                        {% endfor %}
                    </select>
                {% else %}
                    <div class="alert alert-danger">
                        No categories found. Please add a category first.
                    </div>
                {% endif %}
            </div>

            <!-- Stock -->
            <div class="mb-3">
                <label class="form-label">Stock Quantity</label>
                <input type="number" name="stock" class="form-control" min="0" required>
            </div>

            <!-- Price -->
            <div class="mb-3">
                <label class="form-label">Price</label>
                <input type="number" step="0.01" name="price" class="form-control" required>
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4" required></textarea>
            </div>

            <!-- Image -->
            <div class="mb-3">
<label class="form-label">Main Product Image</label>
<input type="file" name="image" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Additional Product Images</label>
<input type="file" name="images" multiple class="form-control">
<small class="text-muted">You can select multiple images</small>
</div>

            <!-- Buttons -->
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check-circle"></i> Add Product
            </button>

            <a href="/products" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back
            </a>

        </form>

    </div>

</div>

</body>
</html>
