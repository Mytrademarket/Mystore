<!DOCTYPE html>
<html>
<head>
<title>Popup Banner</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="p-4">

<div class="container">

<h3>Popup Banner Settings</h3>

<form method="POST">

<div class="form-check mb-3">
<input type="checkbox" class="form-check-input" name="enabled" value="1"
{% if settings.popup_enabled == "1" %}checked{% endif %}>
<label class="form-check-label">Enable Popup</label>
</div>

<div class="mb-3">
<label>Title</label>
<input class="form-control" name="title" value="{{settings.popup_title}}">
</div>

<div class="mb-3">
<label>Text</label>
<textarea class="form-control" name="text">{{settings.popup_text}}</textarea>
</div>

<div class="mb-3">
<label>Button Text</label>
<input class="form-control" name="button_text" value="{{settings.popup_button_text}}">
</div>

<div class="mb-3">
<label>Button Link</label>
<input class="form-control" name="button_link" value="{{settings.popup_button_link}}">
</div>

<button class="btn btn-primary">Save Popup</button>

</form>

</div>

</body>
</html>
