<!DOCTYPE html>
<html>
<head>
<title>Dropshipping Integrations</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.sidebar{
height:100vh;
background:#343a40;
padding-top:20px;
}

.sidebar a{
color:white;
display:block;
padding:12px;
text-decoration:none;
}

.sidebar a:hover{
background:#495057;
}
</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->
<div class="col-md-2 sidebar">

<h4 class="text-white text-center">Admin</h4>

<a href="/admin">Dashboard</a>
<a href="/products">Products</a>
<a href="/orders">Orders</a>
<a href="/site_settings">Site Settings</a>
<a href="/admin/import_product">Import Product</a>
<a href="/admin/integrations">Integrations</a>
<a href="/logout">Logout</a>

</div>


<!-- Main Content -->
<div class="col-md-10 p-4 bg-light">

<h2 class="mb-4">Dropshipping Integrations</h2>

<form method="POST">

<div class="row g-4">

{% for i in integrations %}

<div class="col-md-6">

<div class="card shadow-sm">

<div class="card-body">

<h5 class="card-title text-capitalize">
{{ i.provider }}
</h5>

<div class="mb-3">

<label class="form-label">API Key</label>

<input
type="text"
name="{{ i.provider }}_api"
value="{{ i.api_key or '' }}"
class="form-control"
placeholder="Enter API Key"
>

</div>

<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
name="{{ i.provider }}_enabled"
{% if i.enabled %}checked{% endif %}
>

<label class="form-check-label">
Enable Integration
</label>

</div>

</div>

</div>

</div>

{% endfor %}

</div>

<div class="mt-4">

<button class="btn btn-primary">
Save Integrations
</button>

</div>

</form>

</div>

</div>

</div>

</body>
</html>
